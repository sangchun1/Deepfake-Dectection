project_root: /home/user/SC/Deepfake-Fusion
data:
  name: openfake_logo_sdxl-epic-realism
  dataset_class: OpenFakeDataset
  num_classes: 2
  task: binary_classification
  paths:
    root_dir: /home/user/DATA/deepfake
    train_csv: /home/user/SC/Deepfake-Fusion/data/splits/openfake/logo/sdxl-epic-realism/train.csv
    val_csv: /home/user/SC/Deepfake-Fusion/data/splits/openfake/logo/sdxl-epic-realism/val.csv
    test_csv: /home/user/SC/Deepfake-Fusion/data/splits/openfake/logo/sdxl-epic-realism/test.csv
  image:
    input_size: 224
    channels: 3
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
  labels:
    real: 0
    fake: 1
  dataloader:
    batch_size: 64
    num_workers: 4
    pin_memory: true
    drop_last: false
  train:
    shuffle: true
  val:
    shuffle: false
  test:
    shuffle: false
model:
  name: vit
  family: transformer
  source: timm
  backbone:
    name: vit_small_patch16_224
    pretrained: true
    in_channels: 3
    freeze: false
    img_size: 224
    global_pool: token
    drop_path_rate: 0.1
  head:
    num_classes: 2
    dropout: 0.1
  checkpoint:
    path: null
    strict: true
train:
  experiment:
    name: spatial_vit_openfake
    task: spatial_classification
    output_dir: /home/user/SC/Deepfake-Fusion/outputs/spatial/vit_openfake/logo/sdxl-epic-realism
    seed: 42
    device: cuda
    use_amp: true
  train:
    epochs: 10
    grad_accum_steps: 1
    clip_grad_norm: null
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.001
    betas:
    - 0.9
    - 0.999
  augmentation:
    rotation_degrees: 0.0
    color_jitter_prob: 0.0
    gaussian_blur_prob: 0.2
    gaussian_blur_kernel: 3
    gaussian_noise_prob: 0.2
    gaussian_noise_std: 0.02
    jpeg_prob: 0.2
    jpeg_quality_min: 40
    jpeg_quality_max: 90
    resize_downup_prob: 0.2
    resize_scale_min: 0.5
    resize_scale_max: 0.9
  scheduler:
    name: cosine
    t_max: 10
    eta_min: 1.0e-06
  loss:
    name: cross_entropy
    label_smoothing: 0.0
  logging:
    log_interval: 50
    val_interval: 1
    use_tqdm: true
  checkpoint:
    save_top_k: 1
    monitor: val_auc
    mode: max
    resume_path: null
    early_stopping:
      enabled: true
      patience: 5
      min_delta: 0.0
  evaluation:
    metrics:
    - accuracy
    - precision
    - recall
    - f1
    - auc
    threshold: 0.5
    temperature_json: null
  wandb:
    enabled: true
    project: Deepfake-Fusion
    entity: null
    name: spatial_vit_openfake_holdout_sdxl_epic_realism
    tags:
    - openfake
    - vit
    - spatial
    mode: online
    log_model: false
