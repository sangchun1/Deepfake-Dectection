name: fusion
family: fusion
source: hybrid

spatial:
  name: vit
  family: transformer
  source: timm

  backbone:
    name: vit_small_patch16_224
    pretrained: true
    in_channels: 3
    freeze: false
    img_size: 224
    global_pool: token
    drop_path_rate: 0.1

  head:
    num_classes: 2
    dropout: 0.1

spectral:
  name: spai
  family: spectral
  source: timm

  backbone:
    name: vit_small_patch16_224
    pretrained: true
    in_channels: 3
    freeze: false
    img_size: 224
    global_pool: token
    drop_path_rate: 0.1

  frequency:
    mask_mode: radial
    radius_ratio: 0.25
    fft_norm: ortho
    high_from_residual: true
    clamp_output: false
    eps: 1.0e-8

  aggregation:
    selected_blocks: null
    num_selected_blocks: 4
    token_pool: attention
    feature_pool: cls
    spectral_feature_mode: aggregated_context

  explain:
    rollout_branch: original

  head:
    num_classes: 2
    dropout: 0.1
    hidden_dim: null
    hidden_dim2: null

projection:
  out_dim: 256
  hidden_dim: null
  dropout: 0.1
  activation: gelu
  use_layernorm: true

fusion:
  type: cross_attention_gate
  gate_hidden_dim: 256
  dropout: 0.1
  gate_mode: channel
  use_layernorm: true
  num_heads: 4
  attn_dropout: 0.1
  spectral_token_key: context_stack
  branch_dropout_prob: 0.15
  branch_dropout_mode: exclusive_zero

head:
  num_classes: 2
  hidden_dim: null
  dropout: 0.1
  activation: gelu
  auxiliary:
    enabled: true
    hidden_dim: null
    dropout: 0.1
    activation: gelu

checkpoint:
  path: null
  strict: true